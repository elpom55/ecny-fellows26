<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECNY 2026 Fellows Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0f1f3d;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --cream: #f7f4ef;
    --white: #ffffff;
    --gray: #6b7280;
    --border: #e5e0d8;
    --shadow: 0 4px 24px rgba(15,31,61,0.10);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--navy);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--navy);
    padding: 0 24px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
    position: relative;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: var(--gold);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    color: var(--navy);
    font-weight: 400;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--white);
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  header h1 span {
    color: var(--gold);
  }

  .toggle-group {
    display: flex;
    background: rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 5px;
    gap: 4px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .toggle-btn {
    padding: 12px 32px;
    border: none;
    border-radius: 9px;
    font-family: 'DM Sans', sans-serif;
    font-size: 26px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    color: rgba(255,255,255,0.6);
    background: transparent;
    white-space: nowrap;
  }

  .toggle-btn.active {
    background: var(--gold);
    color: var(--navy);
  }

  .toggle-btn:hover:not(.active) {
    color: white;
    background: rgba(255,255,255,0.15);
  }

  .count-badge {
    font-size: 20px;
    color: rgba(255,255,255,0.5);
    margin-left: 4px;
  }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  #map {
    flex: 1;
    height: 100%;
  }

  .fellow-name {
    font-weight: 500;
    font-size: 14px;
    color: var(--navy);
  }

  .fellow-zip {
    font-size: 12px;
    color: var(--gray);
    margin-top: 2px;
  }

  .profile-panel {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow), 0 0 0 1px var(--border);
    padding: 20px 24px;
    width: 320px;
    z-index: 5;
    display: none;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .profile-panel.visible { display: block; }

  .profile-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--gold);
    flex-shrink: 0;
  }

  .profile-name {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--navy);
    line-height: 1.2;
  }

  .profile-info {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .info-block {
    background: var(--cream);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .info-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--gray);
    margin-bottom: 3px;
    font-weight: 500;
  }

  .info-value {
    font-size: 13px;
    color: var(--navy);
    font-weight: 500;
  }

  .linkedin-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 10px;
    background: #0a66c2;
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
  }

  .linkedin-btn:hover { background: #004182; }

  .linkedin-btn svg {
    width: 16px;
    height: 16px;
    fill: white;
  }

  .close-profile {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 26px;
    height: 26px;
    border: none;
    background: var(--cream);
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    color: var(--gray);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .loading {
    position: fixed;
    inset: 0;
    background: var(--navy);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 16px;
  }

  .loading h2 {
    font-family: 'DM Serif Display', serif;
    color: var(--white);
    font-size: 24px;
    font-weight: 400;
  }

  .loading p { color: rgba(255,255,255,0.5); font-size: 14px; }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(201,168,76,0.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: #fee2e2;
    color: #991b1b;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 20;
    display: none;
  }

  .map-label {
    position: absolute;
    top: 70px;
    left: 16px;
    background: var(--white);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--gray);
    box-shadow: var(--shadow);
    z-index: 5;
    pointer-events: none;
  }

  .map-label span { color: var(--navy); font-weight: 600; }

  @media (max-width: 640px) {
    .sidebar { display: none; }
    header h1 { font-size: 14px; }
    .toggle-btn { padding: 6px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <h2>ECNY 2026 Fellows</h2>
  <p>Loading the map…</p>
</div>

<div class="error-msg" id="error-msg"></div>

<header>
  <div class="header-left">
    <div class="logo-mark">E</div>
    <h1>ECNY <span>2026</span> Fellows</h1>
  </div>
  <div class="toggle-group">
    <button class="toggle-btn active" id="btn-work" onclick="switchMode('work')">
      📍 Weekday <span class="count-badge" id="work-count"></span>
    </button>
    <button class="toggle-btn" id="btn-home" onclick="switchMode('home')">
      🏠 Weekend <span class="count-badge" id="home-count"></span>
    </button>
  </div>
</header>

<div class="main">
  <div id="map"></div>

</div>

<div class="map-label" id="map-label">Showing <span id="label-mode">Weekday</span> locations</div>

<div class="profile-panel" id="profile-panel">
  <button class="close-profile" onclick="closeProfile()">✕</button>
  <div class="profile-header">
    <div class="avatar" id="profile-avatar"></div>
    <div class="profile-name" id="profile-name"></div>
  </div>
  <div class="profile-info">
    <div class="info-block">
      <div class="info-label">Weekday Zip</div>
      <div class="info-value" id="profile-work"></div>
    </div>
    <div class="info-block">
      <div class="info-label">Weekend Zip</div>
      <div class="info-value" id="profile-home"></div>
    </div>
  </div>
  <div class="info-block" id="profile-phone-block" style="margin-bottom:10px; display:none;">
    <div class="info-label">📱 Cell (impromptu coffee?)</div>
    <div class="info-value" id="profile-phone"></div>
  </div>
  <a class="linkedin-btn" id="profile-linkedin" href="#" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
    </svg>
    View LinkedIn Profile
  </a>
</div>

<script>
const SHEET_ID = '1AzHecbqrKCRgwnFYjvM_E62SuCbds8mPyg0wu1BzzkM';
const MAPS_KEY = 'AIzaSyD1wA7lWm5rY3xDBFBji7UjYPRb67Er2Wo';

let map, markers = [], fellows = [], mode = 'work';
let geocodeCache = {};

async function fetchFellows() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const rows = json.table.rows;
  const cols = json.table.cols.map(c => c.label);
  return rows.map(r => {
    const obj = {};
    cols.forEach((c, i) => { obj[c] = r.c[i] ? r.c[i].v : ''; });
    return obj;
  }).filter(r => r['Name'] && r['Name'].toString().trim());
}

async function geocodeZip(zip) {
  if (!zip) return null;
  const key = zip.toString().trim();
  if (geocodeCache[key]) return geocodeCache[key];
  const url = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(key + ', USA')}&key=${MAPS_KEY}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.results && data.results[0]) {
      const loc = data.results[0].geometry.location;
      geocodeCache[key] = loc;
      return loc;
    }
  } catch(e) {}
  return null;
}

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 40.7128, lng: -74.006 },
    zoom: 10,
    styles: [
      { featureType: 'all', elementType: 'geometry', stylers: [{ color: '#f5f1eb' }] },
      { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#c8dbe8' }] },
      { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#ffffff' }] },
      { featureType: 'road.arterial', elementType: 'geometry', stylers: [{ color: '#ede8e0' }] },
      { featureType: 'poi.park', elementType: 'geometry', stylers: [{ color: '#d4e8c8' }] },
      { featureType: 'transit', elementType: 'geometry', stylers: [{ color: '#e8e0d0' }] },
      { elementType: 'labels.text.fill', stylers: [{ color: '#0f1f3d' }] },
      { elementType: 'labels.text.stroke', stylers: [{ color: '#f7f4ef' }] }
    ],
    disableDefaultUI: false,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
  });
}

function clearMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];
}

function getInitials(name) {
  return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
}

async function renderMarkers() {
  clearMarkers();
  const zipField = mode === 'work' ? 'Work Zip (use home zip if remote)' : 'Home Zip (enter even if same as work)';
  
  for (const fellow of fellows) {
    const zip = fellow[zipField];
    if (!zip) continue;
    const loc = await geocodeZip(zip);
    if (!loc) continue;

    const marker = new google.maps.Marker({
      position: loc,
      map,
      title: fellow['Name'],
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 9,
        fillColor: mode === 'work' ? '#e8472a' : '#4a90d9',
        fillOpacity: 1,
        strokeColor: '#ffffff',
        strokeWeight: 2,
      }
    });

    marker.addListener('click', () => showProfile(fellow));
    markers.push(marker);
  }
}

function showProfile(fellow) {
  const name = fellow['Name'] || '';
  const workZip = fellow['Work Zip (use home zip if remote)'] || '—';
  const homeZip = fellow['Home Zip (enter even if same as work)'] || '—';
  const linkedin = fellow['LinkedIn'] || '';
  const phone = fellow['Cellphone (to reach out for impromptu coffee)'] || '';

  document.getElementById('profile-avatar').textContent = getInitials(name);
  document.getElementById('profile-name').textContent = name;
  document.getElementById('profile-work').textContent = workZip;
  document.getElementById('profile-home').textContent = homeZip;

  const phoneBlock = document.getElementById('profile-phone-block');
  document.getElementById('profile-phone').textContent = phone || 'Not provided';
  phoneBlock.style.display = 'block';

  const linkedinBtn = document.getElementById('profile-linkedin');
  if (linkedin) {
    linkedinBtn.href = linkedin.startsWith('http') ? linkedin : 'https://' + linkedin;
    linkedinBtn.style.display = 'flex';
    linkedinBtn.style.opacity = '1';
    linkedinBtn.style.pointerEvents = 'auto';
  } else {
    linkedinBtn.href = '#';
    linkedinBtn.style.display = 'flex';
    linkedinBtn.style.opacity = '0.4';
    linkedinBtn.style.pointerEvents = 'none';
    linkedinBtn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:16px;height:16px;fill:white"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg> LinkedIn Not Provided`;
  }

  document.getElementById('profile-panel').classList.add('visible');
}

function closeProfile() {
  document.getElementById('profile-panel').classList.remove('visible');
}

function buildSidebar() {}

async function switchMode(newMode) {
  mode = newMode;
  document.getElementById('btn-work').classList.toggle('active', mode === 'work');
  document.getElementById('btn-home').classList.toggle('active', mode === 'home');
  document.getElementById('label-mode').textContent = mode === 'work' ? 'Weekday' : 'Weekend';
  closeProfile();
  buildSidebar();
  await renderMarkers();
}

async function init() {
  try {
    fellows = await fetchFellows();
    const workCount = fellows.filter(f => f['Work Zip (use home zip if remote)']).length;
    const homeCount = fellows.filter(f => f['Home Zip (enter even if same as work)']).length;
    document.getElementById('work-count').textContent = workCount || '';
    document.getElementById('home-count').textContent = homeCount || '';
    initMap();
    buildSidebar();
    await renderMarkers();
    document.getElementById('loading').style.display = 'none';
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    const err = document.getElementById('error-msg');
    err.textContent = 'Could not load fellows data. Make sure the Google Sheet is published to the web.';
    err.style.display = 'block';
  }
}
</script>

<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD1wA7lWm5rY3xDBFBji7UjYPRb67Er2Wo&callback=init">
</script>

</body>
</html>
