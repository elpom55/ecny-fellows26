<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECNY 2026 Fellows Map</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0f1f3d; --gold: #c9a84c; --cream: #f7f4ef;
    --white: #ffffff; --gray: #6b7280; --border: #e5e0d8;
    --shadow: 0 4px 24px rgba(15,31,61,0.10);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--navy); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { background: var(--navy); padding: 0 24px; height: 80px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 10; position: relative; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-mark { width: 32px; height: 32px; background: var(--gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--navy); }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 18px; color: var(--white); font-weight: 400; }
  header h1 span { color: var(--gold); }
  .toggle-group { display: flex; background: rgba(255,255,255,0.1); border-radius: 12px; padding: 5px; gap: 4px; position: absolute; left: 50%; transform: translateX(-50%); }
  .toggle-btn { padding: 12px 32px; border: none; border-radius: 9px; font-family: 'DM Sans', sans-serif; font-size: 26px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; color: rgba(255,255,255,0.6); background: transparent; white-space: nowrap; }
  .toggle-btn.active { background: var(--gold); color: var(--navy); }
  .toggle-btn:hover:not(.active) { color: white; background: rgba(255,255,255,0.15); }
  .count-badge { font-size: 20px; color: rgba(255,255,255,0.5); margin-left: 4px; }
  .main { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; height: 100%; }
  .profile-panel { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--white); border-radius: 16px; box-shadow: var(--shadow), 0 0 0 1px var(--border); padding: 20px 20px 16px; width: 360px; z-index: 5; display: none; animation: slideUp 0.2s ease; }
  .profile-panel.visible { display: block; }
  .profile-list-scroll { max-height: 340px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
  .person-card { background: var(--cream); border-radius: 10px; padding: 12px 14px; }
  .person-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .person-card .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--navy); display: flex; align-items: center; justify-content: center; font-family: 'DM Serif Display', serif; font-size: 14px; color: var(--gold); flex-shrink: 0; }
  .person-card .profile-name { font-family: 'DM Serif Display', serif; font-size: 15px; color: var(--navy); }
  .person-card-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .person-card .info-block { background: var(--white); border-radius: 6px; padding: 7px 10px; }
  .info-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gray); margin-bottom: 3px; font-weight: 500; }
  .info-value { font-size: 13px; color: var(--navy); font-weight: 500; }
  .person-card-actions { display: flex; gap: 6px; }
  .person-card-actions a, .person-card-actions .btn-phone { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 7px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; text-decoration: none; }
  .btn-linkedin { background: #0a66c2; color: white; transition: background 0.15s; }
  .btn-linkedin:hover { background: #004182; }
  .btn-linkedin.disabled { opacity: 0.35; pointer-events: none; }
  .btn-phone { background: var(--white); color: var(--navy); border: 1px solid var(--border); }
  .close-profile { position: absolute; top: 12px; right: 12px; width: 26px; height: 26px; border: none; background: var(--cream); border-radius: 50%; cursor: pointer; font-size: 14px; color: var(--gray); display: flex; align-items: center; justify-content: center; }
  @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading { position: fixed; inset: 0; background: var(--navy); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; gap: 16px; }
  .loading h2 { font-family: 'DM Serif Display', serif; color: var(--white); font-size: 24px; font-weight: 400; }
  .loading p { color: rgba(255,255,255,0.5); font-size: 14px; }
  .spinner { width: 36px; height: 36px; border: 3px solid rgba(201,168,76,0.3); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .error-msg { position: fixed; top: 90px; left: 50%; transform: translateX(-50%); background: #fee2e2; color: #991b1b; padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 20; display: none; max-width: 80%; text-align: center; }
  .map-label { position: absolute; top: 90px; left: 16px; background: var(--white); border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 500; color: var(--gray); box-shadow: var(--shadow); z-index: 5; pointer-events: none; }
  .map-label span { color: var(--navy); font-weight: 600; }
  @media (max-width: 640px) { header h1 { font-size: 14px; } .toggle-btn { padding: 6px 10px; font-size: 14px; } .profile-panel { width: 95vw; } }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <h2>ECNY 2026 Fellows</h2>
  <p>Loading the map…</p>
</div>

<div class="error-msg" id="error-msg"></div>

<header>
  <div class="header-left">
    <div class="logo-mark">E</div>
    <h1>ECNY <span>2026</span> Fellows</h1>
  </div>
  <div class="toggle-group">
    <button class="toggle-btn active" id="btn-work" onclick="switchMode('work')">📍 Weekday <span class="count-badge" id="work-count"></span></button>
    <button class="toggle-btn" id="btn-home" onclick="switchMode('home')">🏠 Weekend <span class="count-badge" id="home-count"></span></button>
  </div>
</header>

<div class="main"><div id="map"></div></div>

<div class="map-label" id="map-label">Showing <span id="label-mode">Weekday</span> locations</div>

<div class="profile-panel" id="profile-panel">
  <button class="close-profile" onclick="closeProfile()">✕</button>
  <div id="profile-zip-header" style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--gray);margin-bottom:12px;"></div>
  <div id="profile-list"></div>
</div>

<script>
const SHEET_ID = '1AzHecbqrKCRgwnFYjvM_E62SuCbds8mPyg0wu1BzzkM';
const MAPS_KEY = 'AIzaSyD1wA7lWm5rY3xDBFBji7UjYPRb67Er2Wo';
const WORK_FIELD = 'Work Zip (use home zip if remote)';
const HOME_FIELD = 'Home Zip (enter even if same as work)';
const PHONE_FIELD = 'Cellphone (to reach out for impromptu coffee)';

let map, markers = [], fellows = [], mode = 'work';
let geocodeCache = {};

async function fetchFellows() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
  const res = await fetch(url);
  const text = await res.text();
  const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/);
  if (!match) throw new Error('Could not parse sheet response');
  const json = JSON.parse(match[1]);
  if (!json.table) throw new Error('No table in response');
  const rows = json.table.rows || [];
  const cols = json.table.cols.map(c => c.label);
  console.log('Columns found:', cols);
  return rows.map(r => {
    const obj = {};
    cols.forEach((c, i) => { obj[c] = r.c && r.c[i] && r.c[i].v != null ? r.c[i].v : ''; });
    return obj;
  }).filter(r => r['Name'] && r['Name'].toString().trim());
}

async function geocodeZip(zip) {
  if (!zip) return null;
  // padStart handles numeric zips like 10591 -> "10591" (already 5 digits), and 7030 -> "07030"
  const key = zip.toString().trim().padStart(5, '0');
  if (geocodeCache[key]) return geocodeCache[key];
  const url = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(key + ', USA')}&key=${MAPS_KEY}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    console.log('Geocode', key, '->', data.status, data.error_message || '');
    if (data.results && data.results[0]) {
      const loc = data.results[0].geometry.location;
      geocodeCache[key] = loc;
      return loc;
    }
  } catch(e) { console.error('Geocode fetch error:', e); }
  return null;
}

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 40.7128, lng: -74.006 },
    zoom: 10,
    styles: [
      { featureType: 'all', elementType: 'geometry', stylers: [{ color: '#f5f1eb' }] },
      { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#c8dbe8' }] },
      { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#ffffff' }] },
      { featureType: 'road.arterial', elementType: 'geometry', stylers: [{ color: '#ede8e0' }] },
      { featureType: 'poi.park', elementType: 'geometry', stylers: [{ color: '#d4e8c8' }] },
      { elementType: 'labels.text.fill', stylers: [{ color: '#0f1f3d' }] },
      { elementType: 'labels.text.stroke', stylers: [{ color: '#f7f4ef' }] }
    ],
    mapTypeControl: false, streetViewControl: false, fullscreenControl: false,
  });
}

function clearMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];
}

function getInitials(name) {
  return name.split(' ').filter(Boolean).map(n => n[0]).join('').substring(0, 2).toUpperCase();
}

async function renderMarkers() {
  clearMarkers();
  const zipField = mode === 'work' ? WORK_FIELD : HOME_FIELD;
  const color = mode === 'work' ? '#e8472a' : '#4a90d9';

  const zipGroups = {};
  for (const fellow of fellows) {
    const zip = fellow[zipField];
    if (!zip) continue;
    const key = zip.toString().trim().padStart(5, '0');
    if (!zipGroups[key]) zipGroups[key] = [];
    zipGroups[key].push(fellow);
  }

  console.log('Zip groups:', Object.keys(zipGroups));

  for (const [zip, group] of Object.entries(zipGroups)) {
    const loc = await geocodeZip(zip);
    if (!loc) { console.warn('No location for zip:', zip); continue; }

    const marker = new google.maps.Marker({
      position: loc,
      map,
      title: group.map(f => f['Name']).join(', '),
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 10,
        fillColor: color,
        fillOpacity: 1,
        strokeColor: '#ffffff',
        strokeWeight: 2,
      }
    });

    marker.addListener('click', () => showGroupProfile(group, zip));
    markers.push(marker);
  }

  console.log('Total markers placed:', markers.length);
}

const linkedinSVG = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:13px;height:13px;fill:white;flex-shrink:0"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`;

function showProfile(fellow) { showGroupProfile([fellow], fellow[mode === 'work' ? WORK_FIELD : HOME_FIELD]); }

function showGroupProfile(group, zip) {
  const count = group.length;
  document.getElementById('profile-zip-header').textContent =
    `${count} fellow${count > 1 ? 's' : ''} in zip ${zip || ''}`;

  const list = document.getElementById('profile-list');
  list.innerHTML = `<div class="profile-list-scroll">` +
    group.map(fellow => {
      const name = fellow['Name'] || '';
      const workZip = fellow[WORK_FIELD] ? fellow[WORK_FIELD].toString().padStart(5,'0') : '—';
      const homeZip = fellow[HOME_FIELD] ? fellow[HOME_FIELD].toString().padStart(5,'0') : '—';
      const linkedin = fellow['LinkedIn'] || '';
      const phone = fellow[PHONE_FIELD] || '';
      const linkedinHref = linkedin ? (linkedin.startsWith('http') ? linkedin : 'https://' + linkedin) : '#';
      const linkedinClass = linkedin ? 'btn-linkedin' : 'btn-linkedin disabled';
      const linkedinLabel = linkedin ? 'LinkedIn' : 'No LinkedIn';
      const phoneLabel = phone ? phone.toString() : 'No cell';
      return `
        <div class="person-card">
          <div class="person-card-header">
            <div class="avatar">${getInitials(name)}</div>
            <div class="profile-name">${name}</div>
          </div>
          <div class="person-card-fields">
            <div class="info-block"><div class="info-label">Weekday Zip</div><div class="info-value">${workZip}</div></div>
            <div class="info-block"><div class="info-label">Weekend Zip</div><div class="info-value">${homeZip}</div></div>
          </div>
          <div class="person-card-actions">
            <a href="${linkedinHref}" target="_blank" rel="noopener" class="${linkedinClass}">${linkedinSVG} ${linkedinLabel}</a>
            <div class="btn-phone">📱 ${phoneLabel}</div>
          </div>
        </div>`;
    }).join('') + `</div>`;

  document.getElementById('profile-panel').classList.add('visible');
}

function closeProfile() {
  document.getElementById('profile-panel').classList.remove('visible');
}

async function switchMode(newMode) {
  mode = newMode;
  document.getElementById('btn-work').classList.toggle('active', mode === 'work');
  document.getElementById('btn-home').classList.toggle('active', mode === 'home');
  document.getElementById('label-mode').textContent = mode === 'work' ? 'Weekday' : 'Weekend';
  closeProfile();
  await renderMarkers();
}

async function init() {
  try {
    fellows = await fetchFellows();
    console.log('Fellows loaded:', fellows.length);
    const workCount = fellows.filter(f => f[WORK_FIELD]).length;
    const homeCount = fellows.filter(f => f[HOME_FIELD]).length;
    document.getElementById('work-count').textContent = workCount || '';
    document.getElementById('home-count').textContent = homeCount || '';
    initMap();
    await renderMarkers();
    document.getElementById('loading').style.display = 'none';
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    const err = document.getElementById('error-msg');
    err.textContent = 'Error: ' + e.message;
    err.style.display = 'block';
    console.error('Init error:', e);
  }
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD1wA7lWm5rY3xDBFBji7UjYPRb67Er2Wo&callback=init&loading=async" async defer></script>

</body>
</html>
